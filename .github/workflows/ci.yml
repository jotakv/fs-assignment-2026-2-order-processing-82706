name: CI

on:
  workflow_dispatch:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  DOTNET_VERSION: "9.0.x"
  NODE_VERSION: "20.x"
  SOLUTION_FILE: "SportsSln.sln"
  TEST_PROJECT: "SportsStore.Tests/SportsStore.Tests.csproj"

jobs:
  backend-validation:
    name: Backend Validation (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_FILE }} --no-restore -c Release

      - name: Test solution and collect coverage
        run: >
          dotnet test ${{ env.TEST_PROJECT }} -c Release --no-build
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=test-results.trx"

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate HTML coverage report
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            -reports:"**/coverage.cobertura.xml" \
            -targetdir:"coveragereport" \
            -reporttypes:"Html"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coveragereport

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: coveragereport

  admin-dashboard-validation:
    name: Admin Dashboard Validation (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: admin-dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Run dashboard tests if defined
        run: npm run test --if-present

      - name: Build admin dashboard
        run: npm run build

  deploy:
    name: Publish Coverage Report
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs:
      - backend-validation
      - admin-dashboard-validation
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
